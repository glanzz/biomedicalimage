vision_encoder:
  model_name: "microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
  freeze: true
  output_dim: 768

language_model:
  model_name: "BioMistral/BioMistral-7B"
  load_in_8bit: true
  use_lora: true
  lora_config:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
    bias: "none"
    task_type: "CAUSAL_LM"

projector:
  input_dim: 768   # BiomedCLIP output
  output_dim: 4096  # Mistral-7B hidden size
  hidden_dim: 2048
  num_layers: 2
  activation: "gelu"

image_preprocessing:
  image_size: 224  # BiomedCLIP expects 224x224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
