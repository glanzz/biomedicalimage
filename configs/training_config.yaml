data:
  dataset_name: "axiong/pmc_oa"
  train_split: "train"
  val_split: "valid"
  test_split: "test"
  subset_size: null  # Use full dataset, set to 100000 for testing
  max_caption_length: 256
  batch_size_per_gpu: 4
  num_workers: 4
  prefetch_factor: 2

training:
  num_epochs: 3
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  fp16: false
  bf16: true  # Use bfloat16 on A100

optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: "cosine"
  num_cycles: 0.5

checkpointing:
  save_strategy: "steps"
  save_steps: 1000
  save_total_limit: 3
  load_best_model_at_end: true

evaluation:
  eval_strategy: "steps"
  eval_steps: 500
  per_device_eval_batch_size: 8

distributed:
  backend: "nccl"
  find_unused_parameters: false
